name: Build SEO pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*-locations.js"
      - "generate-static-pages.js"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate static pages
        env:
          LOCATIONS_DIR: "."
          OUT_DIR: "."
          BASE_URL: "https://bathroomreport.app"
          GA_MEASUREMENT_ID: "G-P30WFPVB80"
        run: node generate-static-pages.js

      - name: Commit generated pages
        run: git config user.name "github-actions[bot]" && git config user.email "actions@users.noreply.github.com" && git add guide sitemap-index.xml robots.txt && (git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Rebuild SEO pages [skip ci]" && git push))
